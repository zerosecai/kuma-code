<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="512" height="512">
  <!-- Kuma Code Logo — V6 Circuit Kuma (Full) -->
  <!-- Use this version at 48px and above -->
  
  <!-- Outer ear (left) -->
  <circle cx="48" cy="50" r="22" fill="#1A1A1A" stroke="#00E5FF" stroke-width="3"/>
  <!-- Outer ear (right) -->
  <circle cx="152" cy="50" r="22" fill="#1A1A1A" stroke="#00E5FF" stroke-width="3"/>
  
  <!-- Inner ear (left) -->
  <circle cx="48" cy="52" r="10" fill="#00E5FF" opacity="0.7"/>
  <!-- Inner ear (right) -->
  <circle cx="152" cy="52" r="10" fill="#00E5FF" opacity="0.7"/>
  
  <!-- Head -->
  <ellipse cx="100" cy="115" rx="68" ry="62" fill="#0A0A0A" stroke="#00E5FF" stroke-width="4"/>
  
  <!-- Circuit lines -->
  <path d="M 40 100 L 50 100 L 50 90 L 65 90" stroke="#00E5FF" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 160 100 L 150 100 L 150 90 L 135 90" stroke="#00E5FF" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 100 60 L 100 70 L 110 70 L 110 80" stroke="#00E5FF" stroke-width="1.5" fill="none" opacity="0.6"/>
  
  <!-- Circuit nodes -->
  <circle cx="50" cy="100" r="2" fill="#00E5FF"/>
  <circle cx="65" cy="90" r="2" fill="#00E5FF"/>
  <circle cx="150" cy="100" r="2" fill="#00E5FF"/>
  <circle cx="135" cy="90" r="2" fill="#00E5FF"/>
  <circle cx="100" cy="70" r="2" fill="#00E5FF"/>
  
  <!-- Face area -->
  <ellipse cx="100" cy="130" rx="48" ry="38" fill="#1A1A1A"/>
  
  <!-- Cyan glowing cheeks (concentric) -->
  <circle cx="55" cy="135" r="12" fill="#00E5FF" opacity="0.3"/>
  <circle cx="55" cy="135" r="8" fill="#00E5FF" opacity="0.5"/>
  <circle cx="55" cy="135" r="4" fill="#00E5FF"/>
  <circle cx="145" cy="135" r="12" fill="#00E5FF" opacity="0.3"/>
  <circle cx="145" cy="135" r="8" fill="#00E5FF" opacity="0.5"/>
  <circle cx="145" cy="135" r="4" fill="#00E5FF"/>
  
  <!-- Eyes -->
  <circle cx="72" cy="105" r="13" fill="#0A0A0A" stroke="#00E5FF" stroke-width="2.5"/>
  <circle cx="128" cy="105" r="13" fill="#0A0A0A" stroke="#00E5FF" stroke-width="2.5"/>
  <circle cx="72" cy="105" r="7" fill="#00E5FF"/>
  <circle cx="128" cy="105" r="7" fill="#00E5FF"/>
  <circle cx="72" cy="105" r="3" fill="#FFFFFF"/>
  <circle cx="128" cy="105" r="3" fill="#FFFFFF"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="135" rx="10" ry="8" fill="#00E5FF" stroke="#0A0A0A" stroke-width="1.5"/>
  
  <!-- Mouth -->
  <path d="M 88 152 Q 100 158 112 152" stroke="#00E5FF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>

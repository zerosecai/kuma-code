<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="32" height="32">
  <!-- Kuma Code Logo — V6 Simplified Mark -->
  <!-- Use this version at 16px-32px sizes (favicon, tiny icons) -->
  <!-- Effects removed; only essential shape retained for readability -->
  
  <!-- Ears -->
  <circle cx="48" cy="50" r="24" fill="#0A0A0A" stroke="#00E5FF" stroke-width="5"/>
  <circle cx="152" cy="50" r="24" fill="#0A0A0A" stroke="#00E5FF" stroke-width="5"/>
  <circle cx="48" cy="52" r="11" fill="#00E5FF"/>
  <circle cx="152" cy="52" r="11" fill="#00E5FF"/>
  
  <!-- Head (slightly larger, simpler) -->
  <ellipse cx="100" cy="115" rx="70" ry="64" fill="#0A0A0A" stroke="#00E5FF" stroke-width="6"/>
  
  <!-- Eyes (solid cyan, no rings — readable at 16px) -->
  <circle cx="72" cy="105" r="11" fill="#00E5FF"/>
  <circle cx="128" cy="105" r="11" fill="#00E5FF"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="138" rx="12" ry="10" fill="#00E5FF"/>
</svg>
